{% extends 'base.html' %}
{% block content %}
<h2>Cadastro de jogos</h2>
<hr>

<form action="{{url_for('cadgames')}}" method="post">
    <label>Título</label>
    <input type="text" name="titulo" placeholder="Insira o nome do jogo" class="form-control" required>
    <label>Ano</label>
        <input type="text" name="categoria" placeholder="Insira o ano do jogo" class="form-control" required>
        <label>Categoria</label>
            <input type="text" name="categoria" placeholder="Insira a categoria do jogo" class="form-control" required>
            <input type="submit" value="Cadastrar" class="btn btn-success">
            <input type="reset" value="limpar" class="btn btn-danger">
            </form>
            <br>
            <br>



</form>
<br>
<hr>
<h4> Jogos cadastrados:</h4>
<table class="table table-bordered table-hover">
    <thead>
        <tr>
            <th>Título</th>
            <th>Ano</th>
            <th>Categoria</th>
        </tr>
    </thead>
    <tbody>
        {% for games in listaGames %}
        <tr>
            <td>{{games.titulo}}</td>
            <td>{{games.ano}}</td>
            <td>{{games.categoria}}</td>
        </tr>
        {% endfor %}
    </tbody>
    </thead>
{% endblock content %}
